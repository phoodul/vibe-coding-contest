# =============================================================
# Lefthook — Git Hook Manager
# 역할: 커밋 전 코드 품질 자동 검증 (ESLint + Prettier + TypeScript)
# 설치: npm install -D lefthook && npx lefthook install
# =============================================================

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{ts,tsx,json,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit --skipLibCheck

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
