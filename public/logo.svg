<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a103a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F59E0B" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#ffffff10" stroke-width="2"/>

  <!-- Outer ring — orbit/flow -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.1" stroke-dasharray="8 12"/>

  <!-- Open book base -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M256,320 Q200,310 140,290 L140,180 Q200,200 256,210 Z" fill="#2a2050" stroke="#A78BFA" stroke-width="2" opacity="0.9"/>
    <!-- Right page -->
    <path d="M256,320 Q312,310 372,290 L372,180 Q312,200 256,210 Z" fill="#2a2050" stroke="#A78BFA" stroke-width="2" opacity="0.9"/>
    <!-- Spine highlight -->
    <line x1="256" y1="210" x2="256" y2="320" stroke="#A78BFA" stroke-width="2.5" opacity="0.6"/>
    <!-- Page lines left -->
    <line x1="170" y1="220" x2="240" y2="230" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
    <line x1="175" y1="240" x2="238" y2="248" stroke="#A78BFA" stroke-width="1" opacity="0.15"/>
    <line x1="180" y1="260" x2="236" y2="266" stroke="#A78BFA" stroke-width="1" opacity="0.1"/>
    <!-- Page lines right -->
    <line x1="272" y1="230" x2="342" y2="220" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
    <line x1="274" y1="248" x2="337" y2="240" stroke="#A78BFA" stroke-width="1" opacity="0.15"/>
    <line x1="276" y1="266" x2="332" y2="260" stroke="#A78BFA" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- AI brain/neural network rising from book -->
  <g>
    <!-- Central node -->
    <circle cx="256" cy="150" r="18" fill="url(#accent)" opacity="0.9"/>
    <circle cx="256" cy="150" r="10" fill="#1a103a"/>
    <circle cx="256" cy="150" r="5" fill="#F59E0B"/>

    <!-- Left branch nodes -->
    <circle cx="195" cy="120" r="10" fill="url(#glow)" opacity="0.7"/>
    <circle cx="195" cy="120" r="4" fill="#1a103a"/>
    <circle cx="170" cy="170" r="8" fill="url(#glow)" opacity="0.5"/>
    <circle cx="170" cy="170" r="3" fill="#1a103a"/>

    <!-- Right branch nodes -->
    <circle cx="317" cy="120" r="10" fill="url(#glow)" opacity="0.7"/>
    <circle cx="317" cy="120" r="4" fill="#1a103a"/>
    <circle cx="342" cy="170" r="8" fill="url(#glow)" opacity="0.5"/>
    <circle cx="342" cy="170" r="3" fill="#1a103a"/>

    <!-- Top node -->
    <circle cx="256" cy="90" r="7" fill="url(#accent)" opacity="0.6"/>
    <circle cx="256" cy="90" r="3" fill="#1a103a"/>

    <!-- Connection lines -->
    <line x1="256" y1="132" x2="256" y2="97" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
    <line x1="242" y1="140" x2="205" y2="125" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <line x1="270" y1="140" x2="307" y2="125" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <line x1="190" y1="130" x2="175" y2="163" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>
    <line x1="322" y1="130" x2="337" y2="163" stroke="#A78BFA" stroke-width="1" opacity="0.3"/>

    <!-- Flow lines from book to brain -->
    <path d="M230,210 Q240,180 248,160" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
    <path d="M282,210 Q272,180 264,160" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="150" cy="100" r="2" fill="#F59E0B" opacity="0.4"/>
  <circle cx="362" cy="95" r="2" fill="#F59E0B" opacity="0.4"/>
  <circle cx="130" cy="250" r="1.5" fill="#A78BFA" opacity="0.3"/>
  <circle cx="382" cy="245" r="1.5" fill="#A78BFA" opacity="0.3"/>

  <!-- Text: EduFlow AI -->
  <text x="256" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="52" fill="white" letter-spacing="2">EduFlow</text>
  <text x="256" y="428" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="36" fill="url(#accent)" letter-spacing="8">AI</text>
</svg>
